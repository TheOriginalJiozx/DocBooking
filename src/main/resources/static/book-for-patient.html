<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Booking System - Book an Appointment for a Patient</title>
    <link rel="stylesheet" href="css/book.css">
</head>
<body>
<header>
    <script src="js/header.js"></script>
</header>
<main>
    <h2>Book an Appointment for a Patient</h2>

    <div class="container">
        <form id="booking">
            <label for="patientName">Patient Name:</label>
            <select id="patientName" required>
                <option value="" disabled selected>Select a patient</option>
            </select><br>

            <label for="doctorName">Doctor Name:</label>
            <select id="doctorName" required onchange="updateAvailableTimes()">
                <option value="" disabled selected>Select a doctor</option>
            </select><br>

            <label for="service">Service:</label>
            <select id="service" required>
                <option value="" disabled selected>Select a service</option>
                <option value="General Checkup">General Checkup</option>
                <option value="Specialist Consultation">Specialist Consultation</option>
                <option value="Health Screening">Health Screening</option>
                <option value="Vaccination">Vaccination</option>
            </select><br>

            <label for="bookingTime">Booking Time:</label>
            <select id="bookingTime" required>
                <option value="" disabled selected>Select a time</option>
            </select><br>

            <button type="button" onclick="bookAppointment()">Book</button>
        </form>

        <div id="response"></div>
        <div id="error-msg"></div>
    </div>
</main>

<footer>
    <script src="js/footer.js"></script>
    <script src="js/admincheck.js"></script>
    <script src="js/bookforpatient.js"></script>
</footer>
</body>
</html>
